backend:
  name: github
  repo: bnz183/qubrite
  branch: main
  # Production auth requires an OAuth proxy. Set base_url to your proxy URL.
  # Until a proxy is running, production login will fail (local_backend still works).
  # See automation/cms-admin.md for proxy options.
  # base_url: https://your-oauth-proxy.example.com

local_backend: true

site_url: https://qubrite.com
display_url: https://qubrite.com
logo_url: /brand/icon.svg

media_folder: src/assets/images
public_folder: ../../assets/images

publish_mode: simple

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    extension: mdx
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Publish Date
        name: pubDate
        widget: datetime
        required: true
        format: YYYY-MM-DDTHH:mm:ss[Z]
        date_format: false
        time_format: false
        picker_utc: true
        hint: ISO timestamp in UTC, e.g. 2026-05-20T10:00:00Z
      - label: Hero Image
        name: heroImage
        widget: string
        required: true
        default: ../../assets/images/default-cover.png
        hint: "Relative path from the MDX file: ../../assets/images/filename.jpg"
      - label: Category
        name: category
        widget: select
        required: true
        options:
          - AI & Web Development
          - Automation
          - Cyber Labs
          - Privacy Tech
          - Hardware
          - Business & Finance
      - label: Tags
        name: tags
        widget: list
        allow_add: true
        field:
          label: Tag
          name: tag
          widget: string
        default: []
      - label: Draft
        name: draft
        widget: boolean
        default: true
        hint: Keep true while editing; set false to publish on the live site
      - label: Body
        name: body
        widget: markdown
        required: true
